<div *ngIf="teamSprit.teamSpiritRating < 6.6 ">
    <div *ngIf="teamSprit.teamSpiritRating < 3.4 then content else other_content"> </div>
    <ng-template #content>
        <div class="TeamSpirit" id="critical" >
            
            <div class='Gauge'>
                <div echarts [options]="chartOption" class="demo-chart" style="height: 170px; width: 170px;"></div>
            </div>
            <div class="circle" ><img class="emoji" src="../../../../assets/Images/red.jpeg"></div>
        </div>
    </ng-template>
    <ng-template #other_content>
        <div class="TeamSpirit" id="normal">
            
            <div class='Gauge'>
                <div echarts [options]="chartOption" class="demo-chart" style="height: 170px; width: 170px;"></div>
            </div>
            
            <div class="circle"><img class="emoji" src="../../../../assets/Images/orange.png"></div>
        </div>
    </ng-template>
   
    
</div>
<div  class="TeamSpirit" id="good" *ngIf ="teamSprit.teamSpiritRating > 6.6">
    
    <div class='Gauge'>
        <div echarts [options]="chartOption" class="demo-chart" style="height: 170px; width: 170px;"></div>
    </div>
    <div class="circle" *ngIf = "teamSprit.teamSpiritRating > 6.6"><img class="emoji" src="../../../../assets/Images/green.jpeg"></div>
</div>
<h5 class="title">Team Spirit</h5>
