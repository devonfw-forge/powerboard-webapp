<div class="container pt-4">

    <div class="required">
        <input class="form-control" [formControl]="id" placeholder="User Id">
        <label class="text-danger" *ngIf="id.touched && id.errors?.required">
            Required Field
        </label>

    </div>
    <div class="form-group">
        <button class="btn btn-secondary px-5 mt-3" (click)='login()'>Log In</button>
    </div>


</div>
